<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Bước 1</title>
    <link rel="stylesheet" href="../CSS/bootstrap.min.css">
    <link rel="stylesheet" href="../CSS/default.css">
    <link rel="stylesheet" href="../CSS/QuenMatKhau.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/suggestionbox.css">
</head>

<body class="d-flex flex-column" style="min-height: 100vh;">

    <!-- //HEADER -->
<header class="khoi-dao"></header>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center my-5">

        <!-- //SECTION -->
<main class="main-form shadow-lg w-100">
            <div class="row m-0 align-items-stretch">
                <div
                    class="col-lg-6 d-none d-lg-block p-0 overflow-hidden border-end border-secondary border-opacity-25">
                    <img src="../IMG/unnamed.jpg" class="hinh-minh-hoa" alt="Security">
                </div>

                <div class="col-lg-6 p-5 d-flex flex-column justify-content-center bg-dark">
                    <div class="text-center mb-4">
                        <div class="icon-box mb-3">
                            <i class="fa-solid fa-unlock-keyhole" style="font-size: 40px; color: var(--mau-nhan);"></i>
                        </div>
                        <h2 class="form-title h3 mb-2">Khôi Phục Mật Khẩu</h2>
                        <p class="form-subtitle text-uppercase">Xác minh danh tính</p>
                    </div>

                    <form id="formBuoc1" action="QuenMatKhau_Buoc2.html">
                        <div class="mb-4">
                            <label class="form-label text-light small fw-bold">Email khôi phục</label>
                            <div class="input-group input-group-lg"> <span
                                    class="input-group-text bg-transparent border-secondary text-secondary">
                                    <i class="fa-solid fa-envelope"></i>
                                </span>
                                <input type="email" id="emailInput"
                                    class="form-control bg-transparent border-secondary text-white"
                                    placeholder="Nhập email của bạn..." required>
                            </div>
                        </div>

                        <button type="submit" class="btn-submit py-3 fw-bold fs-5">TIẾP TỤC</button>
                    </form>

                    <div class="mt-4 text-center">
                        <a href="FrmDangNhap.html" class="text-decoration-none small text-secondary transition-link">
                            <i class="fa-solid fa-chevron-left me-1"></i> Quay lại Đăng nhập
                        </a>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <!-- //FOOTER -->
<footer class="chanTrang"></footer>
    <script src="../JS/quen_mat_khau.js"></script>
    <script src="../JS/search.js"></script>
    <script src="../JS/suggestionbox.js"></script>
</body>

</html>
